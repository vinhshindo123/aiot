<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision - Person & Animal Detection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
        }

        /* Header */
        .header {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-bottom: 2px solid #f59e0b;
            text-align: center;
        }

        .header h1 {
            font-size: 26px;
            background: linear-gradient(135deg, #fff, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* Main Container */
        .container {
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 20px;
        }

        /* Control Bar */
        .control-bar {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 25px;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 500;
        }

        input, select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #f59e0b;
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 13px;
        }

        input[type="range"] {
            width: 120px;
        }

        button {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        button.danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
        button.success { background: linear-gradient(135deg, #10b981, #059669); }

        /* Split Screen */
        .split-screen {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .video-panel, .snapshot-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .panel-header {
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 15px;
            border-bottom: 1px solid #f59e0b;
            font-weight: 600;
        }

        .panel-header i {
            margin-right: 8px;
        }

        .video-container, .snapshot-container {
            aspect-ratio: 16/9;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #stream, #snapshot {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Alert Banner */
        .alert-banner {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.9), rgba(185, 28, 28, 0.9));
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: none;
            animation: pulse 1s infinite;
        }

        .alert-banner.show {
            display: block;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.95; transform: scale(1.01); }
        }

        .alert-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .alert-message {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #f59e0b, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Log Tables */
        .logs-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .log-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
        }

        .log-header {
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 15px;
            border-bottom: 1px solid #f59e0b;
            font-weight: 600;
        }

        .log-content {
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
        }

        table {
            width: 100%;
            font-size: 12px;
        }

        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            color: #f59e0b;
        }

        .badge-person {
            background: #ef4444;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
        }

        .badge-animal {
            background: #f59e0b;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
        }

        /* Responsive */
        @media (max-width: 1000px) {
            .split-screen, .logs-container {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 AI Computer Vision System</h1>
        <p>Motion Detection → Bounding Box → AI Classification (Person / Animal) → Snapshot</p>
    </div>

    <div class="container">
        <!-- Control Bar -->
        <div class="control-bar">
            <div class="control-group">
                <label>📷 Camera:</label>
                <input id="source" value="0" style="width: 80px;">
            </div>
            <div class="control-group">
                <label>🎯 Sensitivity:</label>
                <input type="range" id="diff_thresh" min="1" max="255" value="25">
                <span id="diff_val">25</span>
            </div>
            <div class="control-group">
                <label>📏 Min Area:</label>
                <input type="range" id="min_area" min="100" max="5000" value="500">
                <span id="area_val">500</span>
            </div>
            <button onclick="applySettings()" class="success">✅ Áp dụng</button>
            <button onclick="startStream()">▶️ Bắt đầu</button>
            <button onclick="stopStream()" class="danger">⏹️ Dừng</button>
        </div>

        <!-- Split Screen -->
        <div class="split-screen">
            <div class="video-panel">
                <div class="panel-header">
                    <i>📡</i> LIVE STREAM WITH BOUNDING BOX
                </div>
                <div class="video-container">
                    <img id="stream" alt="Camera Stream">
                </div>
            </div>
            <div class="snapshot-panel">
                <div class="panel-header">
                    <i>📸</i> LATEST DETECTION SNAPSHOT
                </div>
                <div class="snapshot-container">
                    <img id="snapshot" alt="Latest Snapshot">
                </div>
            </div>
        </div>

        <!-- Alert Banner -->
        <div id="alertBanner" class="alert-banner">
            <div class="alert-title" id="alertTitle">⚠️ ALERT</div>
            <div class="alert-message" id="alertMessage"></div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="motionScore">0</div>
                <div class="stat-label">🎯 Motion Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="personCount">0</div>
                <div class="stat-label">👤 Person Detected</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="animalCount">0</div>
                <div class="stat-label">🐾 Animal Detected</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalEvents">0</div>
                <div class="stat-label">📊 Total Events</div>
            </div>
        </div>

        <!-- Logs -->
        <div class="logs-container">
            <div class="log-panel">
                <div class="log-header">🤖 AI DETECTION LOG</div>
                <div class="log-content">
                    <div id="detectionLog"></div>
                </div>
            </div>
            <div class="log-panel">
                <div class="log-header">📋 EVENT LOG</div>
                <div class="log-content">
                    <div id="eventLog"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentSource = localStorage.getItem('cameraSource') || '0';
        let currentDiffThresh = 25;
        let currentMinArea = 500;
        let streamInterval = null;
        let lastAlertTime = 0;

        // Khởi tạo UI
        document.getElementById('source').value = currentSource;
        document.getElementById('diff_thresh').value = currentDiffThresh;
        document.getElementById('min_area').value = currentMinArea;
        document.getElementById('diff_val').innerText = currentDiffThresh;
        document.getElementById('area_val').innerText = currentMinArea;

        // Event listeners
        document.getElementById('diff_thresh').oninput = function() {
            currentDiffThresh = this.value;
            document.getElementById('diff_val').innerText = this.value;
        };
        document.getElementById('min_area').oninput = function() {
            currentMinArea = this.value;
            document.getElementById('area_val').innerText = this.value;
        };

        function applySettings() {
            currentSource = document.getElementById('source').value;
            localStorage.setItem('cameraSource', currentSource);
            stopStream();
            setTimeout(() => startStream(), 100);
            showNotification('✅ Đã áp dụng cấu hình mới!');
        }

        function startStream() {
            let url = `/video_feed?source=${encodeURIComponent(currentSource)}&diff_threshold=${currentDiffThresh}&min_area=${currentMinArea}&cooldown=2`;
            document.getElementById('stream').src = url;
            showNotification('🎥 Đang bắt đầu stream với AI detection...');
            
            if (streamInterval) clearInterval(streamInterval);
            streamInterval = setInterval(fetchStatus, 2000);
        }

        function stopStream() {
            document.getElementById('stream').src = '';
            if (streamInterval) {
                clearInterval(streamInterval);
                streamInterval = null;
            }
            showNotification('⏹️ Đã dừng stream');
        }

        async function fetchStatus() {
            try {
                // Get motion status
                const motion = await (await fetch('/motion-status')).json();
                document.getElementById('motionScore').textContent = motion.current_score || 0;
                
                // Show alert if motion detected with classification
                if (motion.motion_detected && motion.last_detection) {
                    const detection = motion.last_detection;
                    const alertBanner = document.getElementById('alertBanner');
                    const alertTitle = document.getElementById('alertTitle');
                    const alertMessage = document.getElementById('alertMessage');
                    
                    alertBanner.classList.add('show');
                    
                    if (detection.classification === 'person') {
                        alertTitle.innerHTML = '🔴 PERSON DETECTED!';
                        alertTitle.style.color = '#ef4444';
                        alertMessage.innerHTML = `⚠️ Phát hiện NGƯỜI! Độ tin cậy: ${(detection.confidence * 100).toFixed(1)}%<br>Thời gian: ${new Date().toLocaleTimeString()}`;
                    } else if (detection.classification === 'animal') {
                        alertTitle.innerHTML = '🐾 ANIMAL DETECTED!';
                        alertTitle.style.color = '#f59e0b';
                        alertMessage.innerHTML = `🦊 Phát hiện ĐỘNG VẬT: ${detection.class_name || 'unknown'}<br>Độ tin cậy: ${(detection.confidence * 100).toFixed(1)}%<br>Thời gian: ${new Date().toLocaleTimeString()}`;
                    } else {
                        alertTitle.innerHTML = '⚠️ MOTION DETECTED';
                        alertTitle.style.color = '#f59e0b';
                        alertMessage.innerHTML = motion.alert_message || 'Phát hiện chuyển động!';
                    }
                    
                    // Update snapshot
                    if (detection.snapshot_url) {
                        document.getElementById('snapshot').src = detection.snapshot_url + '?t=' + Date.now();
                    }
                    
                    setTimeout(() => {
                        alertBanner.classList.remove('show');
                    }, 5000);
                }
                
                // Get detection log
                const detections = await (await fetch('/detections?limit=15')).json();
                let personCount = 0, animalCount = 0;
                
                if (detections.items) {
                    let html = '<table><thead><tr><th>Time</th><th>Type</th><th>Classification</th><th>Confidence</th></tr></thead><tbody>';
                    for (let d of detections.items.slice().reverse()) {
                        if (d.classification === 'person') personCount++;
                        if (d.classification === 'animal') animalCount++;
                        
                        let icon = d.classification === 'person' ? '🔴' : (d.classification === 'animal' ? '🐾' : '❓');
                        let badge = d.classification === 'person' ? '<span class="badge-person">PERSON</span>' : 
                                   (d.classification === 'animal' ? '<span class="badge-animal">ANIMAL</span>' : 'UNKNOWN');
                        
                        html += `<tr>
                            <td>${new Date(d.timestamp).toLocaleTimeString()}</td>
                            <td>${icon} ${badge}</td>
                            <td>${d.classification}</td>
                            <td>${(parseFloat(d.confidence) * 100).toFixed(1)}%</td>
                        </tr>`;
                    }
                    html += '</tbody></table>';
                    document.getElementById('detectionLog').innerHTML = html;
                }
                
                document.getElementById('personCount').textContent = personCount;
                document.getElementById('animalCount').textContent = animalCount;
                
                // Get events
                const events = await (await fetch('/events?limit=15')).json();
                document.getElementById('totalEvents').textContent = events.count || 0;
                
                if (events.items) {
                    let html = '<table><thead><tr><th>Time</th><th>Event</th><th>Details</th></tr></thead><tbody>';
                    for (let e of events.items.slice().reverse()) {
                        let icon = e.event_type?.includes('PERSON') ? '🔴' : 
                                  (e.event_type?.includes('ANIMAL') ? '🐾' : '📝');
                        html += `<tr>
                            <td>${new Date(e.timestamp).toLocaleTimeString()}</td>
                            <td>${icon} ${e.event_type || '-'}</td>
                            <td>${(e.explanation || '').slice(0, 50)}${(e.explanation || '').length > 50 ? '...' : ''}</td>
                        </tr>`;
                    }
                    html += '</tbody></table>';
                    document.getElementById('eventLog').innerHTML = html;
                }
                
                // Refresh latest snapshot
                const latest = await (await fetch('/latest-snapshot')).json();
                if (latest.snapshot_url) {
                    document.getElementById('snapshot').src = latest.snapshot_url + '?t=' + Date.now();
                }
                
            } catch(e) {
                console.error(e);
            }
        }

        function showNotification(msg) {
            const notification = document.createElement('div');
            notification.textContent = msg;
            notification.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: rgba(0,0,0,0.8);
                color: #f59e0b;
                padding: 10px 18px;
                border-radius: 10px;
                z-index: 9999;
                animation: slideIn 0.3s ease;
                border-left: 3px solid #f59e0b;
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        // Auto start
        if (currentSource !== '0') setTimeout(() => startStream(), 500);
        
        fetchStatus();
        setInterval(fetchStatus, 3000);
    </script>
</body>
</html>
